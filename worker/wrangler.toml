name = "md"
main = "worker.js"
compatibility_date = "2024-01-01"

# 环境变量（敏感信息，请在Cloudflare Dashboard中设置）
# [vars]
# GITHUB_TOKEN = "your-github-token"  # 不推荐在这里写，建议在Dashboard设置

# R2存储桶绑定（如果使用R2图片上传）
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "hugolmsim"

# 环境变量配置
# [vars]
# R2 相关
# R2_PUBLIC_URL = "https://your-bucket.your-subdomain.r2.dev"
# R2_BUCKET_NAME = "your-bucket-name"

# 又拍云相关（如果使用又拍云）
# UPYUN_BUCKET = "your-bucket"
# UPYUN_OPERATOR = "operator"
# UPYUN_PASSWORD = "password"  # 敏感信息，建议使用 wrangler secret put
# UPYUN_PATH = "images"
# UPYUN_DOMAIN = "https://cdn.example.com"

# 路由配置（可选）
# [[routes]]
# pattern = "md.example.com/*"
# zone_name = "example.com"
