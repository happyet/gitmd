<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitMD - Markdown 编辑器</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/pinyin-pro/3.26.0/index.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="main-nav">
            <div class="nav-links">
                <a href="index.html" class="active">写文章</a>
                <a href="articles.html">文章管理</a>
                <a href="config.html">配置</a>
            </div>
            <div class="nav-actions">
                <select id="pathSelector" class="path-selector" title="切换目录">
                    <!-- 动态加载 -->
                </select>
                <span class="theme-toggle" id="themeToggle" title="切换主题">🌓</span>
            </div>
        </nav>
        
        <h2>添加文章 <small id="currentPathBadge"></small></h2>
        
        <div class="row">
            <div class="col-8">
        
                <div class="form-section">
                    <div class="form-control">
                        <input type="text" id="title" placeholder="请输入文章标题..." required>
                    </div>
                </div>
                <div class="editor-container">
                    <div class="editor-toolbar">
                        <div class="editor">
                            <ul id="editor-button">
                                <li><span data-action="bold" title="粗体 Ctrl+B"><strong>B</strong></span></li>
                                <li><span data-action="italic" title="斜体 Ctrl+I"><em>I</em></span></li>
                                <li><span data-action="strikethrough" title="删除线"><del>S</del></span></li>
                                <li class="divider"></li>
                                <li><span data-action="heading" data-level="1" title="一级标题">H1</span></li>
                                <li><span data-action="heading" data-level="2" title="二级标题">H2</span></li>
                                <li><span data-action="heading" data-level="3" title="三级标题">H3</span></li>
                                <li class="divider"></li>
                                <li><span data-action="quote" title="引用">Quote</span></li>
                                <li><span data-action="code" title="代码">Code</span></li>
                                <li><span data-action="hr" title="分割线">HR</span></li>
                                <li class="divider"></li>
                                <li><span data-action="link" title="链接 Ctrl+K">Link</span></li>
                                <li><span data-action="image" title="图片">Img</span></li>
                            </ul>
                        </div>
                        <div class="editor-toolbar-right">
                            <button type="button" id="togglePreview" class="preview-toggle" title="切换预览">
                                <span class="preview-icon">👁</span>
                                <span class="preview-text">预览</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="editor-body">
                        <textarea id="content" placeholder="在此输入 Markdown 内容..."></textarea>
                    </div>
                    
                    <div class="editor-footer">
                        <div class="editor-stats">
                            <span id="charCount">0 字</span>
                            <span id="wordCount">0 词</span>
                            <span id="readTime">约 0 分钟</span>
                        </div>
                    </div>
                </div>
                
                <div id="previewPanel" class="preview-panel">
                    <div class="preview-header">
                        <span>实时预览</span>
                        <button type="button" id="closePreview" class="close-preview" title="关闭预览">×</button>
                    </div>
                    <div id="livePreview" class="preview-content"></div>
                </div>
                
                <div class="form-actions">
                    <button type="button" id="saveBtn">保存文章</button>
                </div>
            </div>
            
            <div class="col-2">
                <div class="sidebar-panel">
                    <h3>文章设置</h3>

                    <div class="form-control form-group">
                        <input type="text" id="url" placeholder="自定义URL（可选）">
                        <button type="button" id="generateUrl">生成</button>
                    </div>
                    
                    <div class="form-control">
                        <label for="author">作者</label>
                        <input type="text" id="author" value="Author">
                    </div>
                    
                    <div class="form-control">
                        <label for="date">发布日期</label>
                        <input type="datetime-local" id="date">
                    </div>
                    
                    <div class="form-control">
                        <label>选项设置</label>
                        <div class="checkbox-group vertical">
                            <label>
                                <input type="checkbox" id="comments" checked>
                                允许评论
                            </label>
                            <label>
                                <input type="checkbox" id="showThumbnail" checked>
                                显示缩略图
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="github-api.js"></script>
    <script src="editor.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
