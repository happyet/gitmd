<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - GitMD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="main-nav">
            <div class="nav-links">
                <a href="index.html">写文章</a>
                <a href="articles.html" class="active">文章管理</a>
                <a href="config.html">配置</a>
            </div>
            <div class="nav-actions">
                <select id="pathSelector" class="path-selector" title="切换目录"></select>
                <span class="theme-toggle" id="themeToggle" title="切换主题">🌓</span>
            </div>
        </nav>
        
        <h2>文章管理 <small id="articleCount"></small></h2>
        
        <!-- 筛选栏 -->
        <div class="filter-bar">
            <form class="filter-form">
                <input type="text" id="searchInput" placeholder="搜索标题...">
                <button type="button" id="filterBtn">筛选</button>
                <button type="button" id="resetBtn" class="btn">重置</button>
            </form>
        </div>
        
        <!-- 批量操作 -->
        <div class="batch-actions">
            <button type="button" id="selectAllBtn">全选</button>
            <button type="button" id="batchDeleteBtn" class="btn delete" disabled>批量删除</button>
        </div>
        
        <!-- 文章列表 -->
        <div id="articleList" class="article-list">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="github-api.js"></script>
    <script src="scripts.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async function() {
        if (!checkConfig()) return;
        
        initPathSelector();
        
        const api = new GitHubAPI(GitMDConfig);
        
        // 加载文章列表
        let allArticles = [];
        let filteredArticles = [];
        
        async function loadArticles() {
            try {
                document.getElementById('articleList').innerHTML = '<div class="loading">加载中...</div>';
                
                allArticles = await api.getArticles();
                filteredArticles = [...allArticles];
                
                updateArticleCount();
                renderArticles();
            } catch (error) {
                document.getElementById('articleList').innerHTML = 
                    `<div class="error-message">加载失败: ${error.message}</div>`;
            }
        }
        
        // 更新文章数量
        function updateArticleCount() {
            const count = document.getElementById('articleCount');
            if (count) {
                count.textContent = `(${filteredArticles.length}/${allArticles.length})`;
            }
        }
        
        // 渲染文章列表
        function renderArticles() {
            const container = document.getElementById('articleList');
            
            if (filteredArticles.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>暂无文章</p></div>';
                return;
            }
            
            container.innerHTML = filteredArticles.map(article => `
                <div class="article-item" data-filename="${article.filename}">
                    <div class="d-flex">
                        <input type="checkbox" class="article-checkbox" value="${article.filename}">
                        <div class="article-header">
                            <h3>
                                <a href="index.html?file=${encodeURIComponent(article.filename)}">
                                    ${escapeHtml(article.title) || '无标题'}
                                </a>
                            </h3>
                            <div class="article-meta">
                                <span class="date">${formatDate(article.date)}</span>
                            </div>
                        </div>
                        <div class="article-actions">
                            <a href="index.html?file=${encodeURIComponent(article.filename)}" class="btn">编辑</a>
                            <button class="btn delete" onclick="deleteArticle('${article.filename}', '${article.sha}')">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 绑定复选框事件
            document.querySelectorAll('.article-checkbox').forEach(cb => {
                cb.addEventListener('change', updateBatchButtons);
            });
        }
        
        // 筛选文章
        function filterArticles() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            filteredArticles = allArticles.filter(article => {
                if (search && !article.title.toLowerCase().includes(search)) return false;
                return true;
            });
            
            updateArticleCount();
            renderArticles();
        }
        
        // 删除文章
        window.deleteArticle = async function(filename, sha) {
            if (!confirm(`确定删除文章 "${filename}"？`)) return;
            
            try {
                await api.deleteFile(
                    `${GitMDConfig.contentPath}/${filename}`,
                    `删除文章: ${filename}`,
                    sha
                );
                
                showMessage('删除成功', 'success');
                loadArticles();
            } catch (error) {
                showMessage('删除失败: ' + error.message, 'error');
            }
        };
        
        // 批量删除
        async function batchDelete() {
            const checked = document.querySelectorAll('.article-checkbox:checked');
            if (checked.length === 0) return;
            
            if (!confirm(`确定删除 ${checked.length} 篇文章？`)) return;
            
            const filenames = Array.from(checked).map(cb => cb.value);
            
            try {
                for (const filename of filenames) {
                    const article = allArticles.find(a => a.filename === filename);
                    if (article) {
                        await api.deleteFile(
                            `${GitMDConfig.contentPath}/${filename}`,
                            `删除文章: ${filename}`,
                            article.sha
                        );
                    }
                }
                
                showMessage('批量删除成功', 'success');
                loadArticles();
            } catch (error) {
                showMessage('批量删除失败: ' + error.message, 'error');
            }
        }
        
        // 更新批量按钮状态
        function updateBatchButtons() {
            const checked = document.querySelectorAll('.article-checkbox:checked').length;
            document.getElementById('batchDeleteBtn').disabled = checked === 0;
        }
        
        // 全选/取消
        document.getElementById('selectAllBtn').addEventListener('click', function() {
            const checkboxes = document.querySelectorAll('.article-checkbox');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            
            checkboxes.forEach(cb => cb.checked = !allChecked);
            this.textContent = allChecked ? '全选' : '取消';
            updateBatchButtons();
        });
        
        // 批量删除按钮
        document.getElementById('batchDeleteBtn').addEventListener('click', batchDelete);
        
        // 筛选按钮
        document.getElementById('filterBtn').addEventListener('click', filterArticles);
        document.getElementById('resetBtn').addEventListener('click', function() {
            document.getElementById('searchInput').value = '';
            filteredArticles = [...allArticles];
            updateArticleCount();
            renderArticles();
        });
        
        // 加载文章
        loadArticles();
    });
    
    function formatDate(dateStr) {
        try {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch {
            return dateStr;
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    </script>
</body>
</html>
